<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Memory</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-brand">Claude Memory</div>
        <div class="nav-links">
            <a href="#" class="nav-link active" data-section="search">Search</a>
            <a href="#" class="nav-link" data-section="facts">Facts</a>
            <a href="#" class="nav-link" data-section="sessions">Sessions</a>
            <a href="#" class="nav-link" data-section="claude-md">CLAUDE.md</a>
            <a href="#" class="nav-link" data-section="context-preview">Context Preview</a>
        </div>
    </nav>

    <main class="content">
        <!-- Search Section -->
        <section id="section-search" class="section active">
            <div class="search-container">
                <div class="mode-toggle">
                    <button class="mode-tab active" data-mode="search">Search</button>
                    <button class="mode-tab" data-mode="ask">Ask</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search your memory..." autocomplete="off">
                    <button id="search-btn" class="btn-primary">Go</button>
                </div>
                <div class="search-options">
                    <label class="checkbox-label" id="semantic-toggle">
                        <input type="checkbox" id="include-semantic"> Include semantic results
                    </label>
                </div>
            </div>
            <div id="search-results" class="results-container"></div>
        </section>

        <!-- Facts Section -->
        <section id="section-facts" class="section">
            <h2>Facts</h2>
            <div class="facts-toolbar">
                <div class="facts-filters">
                    <select id="facts-category-filter" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="preference">preference</option>
                        <option value="decision">decision</option>
                        <option value="learning">learning</option>
                        <option value="context">context</option>
                        <option value="tool">tool</option>
                        <option value="pattern">pattern</option>
                        <option value="workflow">workflow</option>
                        <option value="architecture">architecture</option>
                    </select>
                    <select id="facts-project-filter" class="filter-select">
                        <option value="">All Projects</option>
                    </select>
                    <div class="confidence-filter">
                        <label class="filter-label">Confidence:</label>
                        <input type="number" id="facts-min-confidence" class="confidence-input" min="0" max="1" step="0.1" placeholder="Min" value="">
                        <span class="filter-label">–</span>
                        <input type="number" id="facts-max-confidence" class="confidence-input" min="0" max="1" step="0.1" placeholder="Max" value="">
                    </div>
                </div>
                <div class="facts-sort">
                    <label class="filter-label">Sort:</label>
                    <select id="facts-sort-field" class="filter-select">
                        <option value="timestamp">Date</option>
                        <option value="confidence">Confidence</option>
                        <option value="category">Category</option>
                    </select>
                    <button id="facts-sort-order" class="btn-sort" title="Toggle sort order">&#x25BC; DESC</button>
                </div>
            </div>
            <div id="facts-content" class="section-content"></div>
            <div class="facts-pagination" id="facts-pagination"></div>
        </section>

        <!-- Sessions Section -->
        <section id="section-sessions" class="section">
            <h2>Sessions</h2>
            <div id="sessions-content" class="section-content">
                <p>Session browser coming soon.</p>
            </div>
        </section>

        <!-- CLAUDE.md Section -->
        <section id="section-claude-md" class="section">
            <h2>CLAUDE.md Editor</h2>
            <div class="claude-md-toolbar">
                <div class="claude-md-path" id="claude-md-path"></div>
                <button id="claude-md-save" class="btn-primary btn-sm">Save</button>
                <span id="claude-md-status" class="save-status"></span>
            </div>
            <div class="claude-md-layout">
                <div class="claude-md-editor-pane">
                    <textarea id="claude-md-editor" class="claude-md-textarea" placeholder="Enter your CLAUDE.md content here...&#10;&#10;Supports markdown: # headers, **bold**, `code`, - lists, ```code blocks```"></textarea>
                </div>
                <div class="claude-md-preview-pane">
                    <div class="preview-label">Preview</div>
                    <div id="claude-md-preview" class="claude-md-preview"></div>
                </div>
            </div>
        </section>

        <!-- Context Preview Section -->
        <section id="section-context-preview" class="section">
            <h2>Memory Context Preview</h2>
            <div class="context-toolbar">
                <div class="context-controls">
                    <div class="token-budget-control">
                        <label class="filter-label" for="token-budget-slider">Token Budget:</label>
                        <input type="range" id="token-budget-slider" min="500" max="4000" step="100" value="2000">
                        <span id="token-budget-value" class="token-budget-value">2000</span>
                    </div>
                    <div class="context-project-control">
                        <label class="filter-label" for="context-project-filter">Project:</label>
                        <select id="context-project-filter" class="filter-select">
                            <option value="">All Projects</option>
                        </select>
                    </div>
                    <button id="context-regenerate" class="btn-primary btn-sm">Regenerate</button>
                </div>
                <div id="context-status" class="context-status"></div>
            </div>
            <div id="context-preview-output" class="context-preview-output"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
